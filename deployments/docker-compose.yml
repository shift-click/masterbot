services:
  redroid:
    image: ${REDROID_IMAGE:-redroid/redroid:12.0.0-latest}
    privileged: true
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      REDROID_GPU_MODE: guest
    volumes:
      - redroid-data:/data

  jucobot:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    restart: unless-stopped
    depends_on:
      redroid:
        condition: service_healthy
    environment:
      JUCOBOT_IRIS_ENABLED: ${JUCOBOT_IRIS_ENABLED:-true}
      JUCOBOT_IRIS_WS_URL: ${JUCOBOT_IRIS_WS_URL:-ws://redroid:3000/ws}
      JUCOBOT_IRIS_HTTP_URL: ${JUCOBOT_IRIS_HTTP_URL:-http://redroid:3000}
      JUCOBOT_BOT_LOG_LEVEL: ${JUCOBOT_BOT_LOG_LEVEL:-info}
      JUCOBOT_COUPANG_DB_PATH: /app/data/coupang.db
    volumes:
      - ../configs/config.yaml:/app/configs/config.yaml:ro
      - jucobot-data:/app/data

volumes:
  redroid-data:
  jucobot-data:
